<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权登录</title>
    <style>
        /* 样式与之前相同，可复用 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #1e2b3c 0%, #0f1a24 100%); display: flex; justify-content: center; align-items: center; padding: 1.5rem; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border-radius: 2rem; padding: 2rem 2rem 2.5rem; box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; max-width: 460px; }
        h1 { font-size: 1.9rem; font-weight: 600; text-align: center; color: white; margin-bottom: 0.5rem; }
        .sub { text-align: center; color: rgba(255, 255, 255, 0.7); margin-bottom: 2rem; font-size: 0.9rem; }
        .auth-area { background: rgba(0, 0, 0, 0.3); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.2rem; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; color: white; font-weight: 500; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.85rem 1rem; background: rgba(255, 255, 255, 0.9); border: none; border-radius: 1.2rem; font-size: 1rem; text-align: center; outline: none; }
        input:focus { background: white; box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.5); }
        button { width: 100%; background: #ffc857; border: none; padding: 0.85rem; border-radius: 2rem; font-weight: bold; font-size: 1rem; color: #1e2b3c; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        button:hover { background: #ffcd74; transform: scale(0.98); }
        .status { margin-top: 1.5rem; padding: 0.8rem; border-radius: 1.2rem; text-align: center; font-size: 0.9rem; background: rgba(0, 0, 0, 0.4); color: white; border-left: 4px solid #ffc857; }
        .success-badge { background: rgba(46, 204, 113, 0.2); border-left-color: #2ecc71; color: #d0ffd0; }
        .error-badge { background: rgba(231, 76, 60, 0.2); border-left-color: #e74c3c; }
        .info-badge { background: rgba(52, 152, 219, 0.2); border-left-color: #3498db; }
        .footer-note { margin-top: 1.8rem; text-align: center; font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 授权登录</h1>
    <div class="sub">本地安全授权 · 一次一码</div>

    <div id="authContainer">
        <div class="auth-area">
            <div class="input-group">
                <label>📟 授权码</label>
                <input type="text" id="authCode" placeholder="请输入脚本显示的6位数字" maxlength="6" autocomplete="off">
            </div>
            <button id="authBtn">✅ 立即授权</button>
        </div>
        <div id="statusMsg" class="status info-badge">
            ⚡ 请先运行 auth.ps1 脚本，将显示的授权码输入上方
        </div>
    </div>
    <div class="footer-note">
        💡 使用说明：在 PowerShell 中运行 <code>irm https://xiaohondan.github.io/auth.ps1 | iex</code> → 输入控制台显示的授权码
    </div>
</div>

<script>
    const LOCAL_API = 'http://localhost:8081';   // 与脚本端口一致
    const authBtn = document.getElementById('authBtn');
    const authCodeInput = document.getElementById('authCode');
    const statusDiv = document.getElementById('statusMsg');

    function setStatus(message, type = 'info') {
        statusDiv.innerHTML = message;
        statusDiv.className = `status ${type}-badge`;
    }

    async function performAuth(code) {
        if (!code || code.length === 0) {
            setStatus('❌ 请输入授权码', 'error');
            return false;
        }
        if (!/^\d+$/.test(code)) {
            setStatus('❌ 授权码必须为纯数字', 'error');
            return false;
        }

        setStatus('⏳ 正在验证授权码，请稍候...', 'info');
        try {
            const response = await fetch(`${LOCAL_API}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success === true) {
                setStatus('✅ 授权成功，正在跳转...', 'success');
                // 存储登录状态
                localStorage.setItem('auth_success', 'true');
                // 通知脚本退出
                await fetch(`${LOCAL_API}/confirm`, { method: 'POST' }).catch(e => console.warn);
                // 跳转到主页
                window.location.href = '/index.html';
                return true;
            } else {
                setStatus('❌ 授权码错误，请检查后重试', 'error');
                authCodeInput.value = '';
                authCodeInput.focus();
                return false;
            }
        } catch (error) {
            console.error(error);
            setStatus('⚠️ 无法连接到本地授权服务，请确认 auth.ps1 脚本正在运行 (http://localhost:8085)', 'error');
            return false;
        }
    }

    authBtn.addEventListener('click', async () => {
        const code = authCodeInput.value.trim();
        await performAuth(code);
    });

    authCodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') authBtn.click();
    });
</script>
</body>
</html>
